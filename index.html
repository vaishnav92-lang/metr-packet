<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METR Hiring Pipeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; }
  a { color: #364fc7; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .header { background: #1a1a2e; color: #fff; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 1.3rem; font-weight: 600; }
  .header .meta { font-size: 0.85rem; color: #adb5bd; }

  .stats { display: flex; gap: 20px; padding: 16px 32px; }
  .stat { background: #fff; border-radius: 8px; padding: 14px 20px; border: 1px solid #e9ecef; flex: 1; text-align: center; }
  .stat .num { font-size: 1.8rem; font-weight: 700; }
  .stat .label { font-size: 0.78rem; color: #868e96; text-transform: uppercase; letter-spacing: 0.04em; }

  .container { padding: 0 32px 80px; }

  /* Tier sections */
  .tier-section { margin-top: 24px; }
  .tier-label { padding: 8px 0; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid #dee2e6; margin-bottom: 8px; }

  /* Candidate cards - unified (no separate summary/detail) */
  .card { background: #fff; border-radius: 8px; border: 1px solid #e9ecef; margin-top: 10px; overflow: hidden; }
  .card-summary { padding: 14px 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; }
  .card-summary:hover { background: #f8f9fa; }
  .card-summary .name-col { flex: 1.5; min-width: 0; }
  .card-summary .name-col .name { font-size: 0.95rem; font-weight: 600; }
  .card-summary .name-col .role { font-size: 0.75rem; color: #868e96; }
  .card-summary .cs-col { flex: 0.5; text-align: center; }
  .card-summary .tests-col { flex: 1.5; font-size: 0.82rem; }
  .card-summary .clout-col { flex: 2.5; font-size: 0.78rem; color: #495057; line-height: 1.3; overflow: hidden; max-height: 3.9em; }
  .card-summary .lever-col { flex: 0.4; text-align: center; }
  .card-summary .action-col { flex: 1; display: flex; justify-content: flex-end; align-items: center; }

  .col-headers { display: flex; align-items: center; gap: 16px; padding: 8px 20px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: #868e96; font-weight: 600; border-bottom: 2px solid #dee2e6; background: #f8f9fa; border-radius: 8px 8px 0 0; margin-top: 8px; }
  .col-headers .name-col { flex: 1.5; }
  .col-headers .cs-col { flex: 0.5; text-align: center; }
  .col-headers .tests-col { flex: 1.5; }
  .col-headers .clout-col { flex: 2.5; }
  .col-headers .lever-col { flex: 0.4; text-align: center; }
  .col-headers .action-col { flex: 1; text-align: right; padding-right: 24px; }

  /* Action dropdown */
  .action-trigger { padding: 5px 14px; border-radius: 6px; border: 1px solid #364fc7; background: #fff; color: #364fc7; cursor: pointer; font-size: 0.78rem; font-weight: 600; }
  .action-trigger:hover { background: #364fc7; color: #fff; }
  .action-trigger.decided { border-color: transparent; color: #fff; }
  .action-trigger.decided-interview { background: #2b8a3e; }
  .action-trigger.decided-reject { background: #c92a2a; }
  .action-trigger.decided-hold { background: #e67700; }
  .action-trigger.decided-send { background: #364fc7; }
  .action-panel { display: none; padding: 12px 20px; background: #f8f9fa; border-top: 1px solid #e9ecef; }
  .action-panel.visible { display: block; }
  .action-panel .action-buttons { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .action-panel .action-label { font-size: 0.82rem; color: #495057; font-weight: 500; margin-right: 8px; }
  .waiting-label { font-size: 0.75rem; color: #adb5bd; font-style: italic; }
  .expand-icon { font-size: 0.75rem; color: #adb5bd; transition: transform 0.2s; margin-left: 8px; }
  .card.expanded .expand-icon { transform: rotate(90deg); }

  .card-detail { display: none; padding: 0 20px 16px; border-top: 1px solid #f1f3f5; }
  .card.expanded .card-detail { display: block; }

  /* Badges */
  .badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 0.73rem; font-weight: 500; }
  .b-above { background: #d3f9d8; color: #2b8a3e; }
  .b-bord-above { background: #fff3bf; color: #e67700; }
  .b-bord-below { background: #ffe8cc; color: #d9480f; }
  .b-below { background: #ffe3e3; color: #c92a2a; }
  .b-ungraded { font-size: 0.73rem; color: #adb5bd; }
  .badge-full { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.78rem; font-weight: 500; }
  .cs-green { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; background: #d3f9d8; color: #2b8a3e; }
  .cs-yellow { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; background: #fff3bf; color: #e67700; }
  .cs-red { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; background: #ffe3e3; color: #c92a2a; }
  .link-pill { font-size: 0.73rem; color: #364fc7; margin-right: 4px; padding: 1px 4px; background: #f1f3f5; border-radius: 3px; text-decoration: none; }

  /* Test blocks in detail */
  .test-hdr { margin-top: 10px; padding: 8px 12px; background: #f8f9fa; border-radius: 6px 6px 0 0; border: 1px solid #e9ecef; border-bottom: none; display: flex; justify-content: space-between; align-items: center; }
  .test-body { border: 1px solid #e9ecef; border-radius: 0 0 6px 6px; margin-bottom: 8px; }
  .rev-row { padding: 8px 12px; border-bottom: 1px solid #f1f3f5; }
  .rev-row:last-child { border-bottom: none; }
  .rev-hdr { display: flex; justify-content: space-between; align-items: center; }
  .rev-name { font-size: 0.82rem; font-weight: 600; color: #495057; }
  .rev-notes { font-size: 0.82rem; color: #495057; line-height: 1.4; margin-top: 4px; }
  .rev-notes.collapsed { max-height: 80px; overflow: hidden; position: relative; }
  .rev-notes.collapsed::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: linear-gradient(transparent, white); }
  .show-more { font-size: 0.78rem; color: #364fc7; cursor: pointer; margin-top: 2px; display: inline-block; }
  .lever-notes { background: #f8f9fa; border-radius: 6px; padding: 10px 14px; margin-top: 8px; font-size: 0.82rem; color: #495057; }
  .lever-notes .ln-label { font-size: 0.72rem; text-transform: uppercase; color: #868e96; margin-bottom: 4px; letter-spacing: 0.03em; }

  /* Decision buttons */
  .btn { padding: 4px 12px; border-radius: 6px; border: 1px solid #dee2e6; background: #fff; cursor: pointer; font-size: 0.78rem; font-weight: 500; transition: all 0.15s; }
  .btn:hover { border-color: #adb5bd; }
  .btn-interview { color: #2b8a3e; border-color: #2b8a3e; }
  .btn-interview:hover, .btn-interview.active { background: #2b8a3e; color: #fff; }
  .btn-reject { color: #c92a2a; border-color: #c92a2a; }
  .btn-reject:hover, .btn-reject.active { background: #c92a2a; color: #fff; }
  .btn-hold { color: #e67700; border-color: #e67700; }
  .btn-hold:hover, .btn-hold.active { background: #e67700; color: #fff; }
  .btn-send { color: #364fc7; border-color: #364fc7; }
  .btn-send:hover, .btn-send.active { background: #364fc7; color: #fff; }

  .decision-note { margin-top: 8px; display: none; }
  .decision-note.visible { display: block; }
  .decision-note textarea { width: 100%; padding: 8px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 0.82rem; font-family: inherit; resize: vertical; min-height: 40px; }
  .decision-note textarea::placeholder { color: #adb5bd; }

  .decided-tag { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.73rem; font-weight: 600; margin-left: 6px; }
  .dt-interview { background: #d3f9d8; color: #2b8a3e; }
  .dt-reject { background: #ffe3e3; color: #c92a2a; }
  .dt-hold { background: #fff3bf; color: #e67700; }
  .dt-send { background: #dbe4ff; color: #364fc7; }

  /* Sticky footer */
  .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; color: #fff; padding: 12px 32px; display: flex; justify-content: space-between; align-items: center; z-index: 100; font-size: 0.85rem; }
  .footer-bar .pending { color: #adb5bd; }
  .footer-bar .pending.has-decisions { color: #fff; }
  .submit-btn { padding: 8px 20px; background: #364fc7; color: #fff; border: none; border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
  .submit-btn:hover { background: #2b3fb0; }
  .submit-btn:disabled { background: #495057; cursor: default; }
  .clear-btn { padding: 8px 16px; background: transparent; color: #adb5bd; border: 1px solid #495057; border-radius: 6px; font-size: 0.82rem; cursor: pointer; margin-left: 8px; }
  .submit-ok { color: #2b8a3e; margin-left: 12px; font-size: 0.82rem; }

  .loading { text-align: center; padding: 60px; color: #868e96; font-size: 1rem; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Hiring Pipeline &mdash; Ready for Review</h1>
    <div class="meta" id="subtitle">Loading...</div>
  </div>
  <div class="meta" id="counts"></div>
</div>

<div class="stats" id="stats-bar"></div>

<div class="container" id="main">
  <div class="loading">Loading packet data...</div>
</div>

<div class="footer-bar">
  <div>
    <span class="pending" id="pending-label">0 decisions pending</span>
    <span class="submit-ok" id="submit-status"></span>
  </div>
  <div>
    <button class="submit-btn" id="submit-btn" disabled onclick="submitDecisions()">Submit Decisions</button>
    <button class="clear-btn" onclick="clearAll()">Clear</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hzpgmmgsjcwyxraitvnt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ba1lsjKp4HndXWBW5yKZAw_8drosOc0';

const decisions = {};
let candidatesData = [];

async function query(table, params = '') {
  const resp = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return resp.json();
}
async function insert(table, data) {
  const resp = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(data)
  });
  return resp.json();
}
async function del(table, params) {
  return fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function ratingBadge(r, full) {
  if (!r) return full ? '<span style="color:#868e96">--</span>' : '';
  const rl = r.toLowerCase();
  const map = [
    ['clearly above','b-above','#d3f9d8','#2b8a3e','Above','Clearly above bar'],
    ['borderline above','b-bord-above','#fff3bf','#e67700','Bord. Above','Borderline above'],
    ['borderline below','b-bord-below','#ffe8cc','#d9480f','Bord. Below','Borderline below'],
    ['clearly below','b-below','#ffe3e3','#c92a2a','Below','Clearly below bar']
  ];
  for (const [key,cls,bg,c,short,long] of map) {
    if (rl.includes(key)) {
      const label = full ? long : short;
      return `<span class="${full?'badge-full':'badge'}" style="background:${bg};color:${c}">${label}</span>`;
    }
  }
  return '';
}

function csBadge(cs) {
  if (!cs) return '<span style="color:#868e96">--</span>';
  const num = parseInt(cs);
  const cls = num >= 580 ? 'cs-green' : num >= 500 ? 'cs-yellow' : 'cs-red';
  return `<span class="${cls}">${esc(cs)}</span>`;
}

function linkPill(url) {
  let label = 'Web';
  if (url.includes('linkedin')) label = 'LI';
  else if (url.includes('github')) label = 'GH';
  else if (url.includes('scholar')) label = 'Scholar';
  return `<a href="${esc(url)}" target="_blank" class="link-pill">${label}</a>`;
}

const tierLabels = {0:'Ready for Decision', 1:'Waiting on Grades', 2:'Waiting on Submissions'};
const tierColors = {0:'#2b8a3e', 1:'#e67700', 2:'#868e96'};

function toggleCard(id) {
  document.getElementById(`card-${id}`).classList.toggle('expanded');
}

function toggleAction(id, e) {
  if (e) e.stopPropagation();
  const panel = document.getElementById(`action-panel-${id}`);
  if (panel) panel.classList.toggle('visible');
}

function toggleNotes(btn) {
  const notes = btn.previousElementSibling;
  if (notes.classList.contains('collapsed')) {
    notes.classList.remove('collapsed');
    btn.textContent = 'show less';
  } else {
    notes.classList.add('collapsed');
    btn.textContent = 'show more';
  }
}

function decide(candId, decision, name, e) {
  if (e) e.stopPropagation();
  const trigger = document.querySelector(`#card-${candId} .action-trigger`);
  if (decisions[candId] && decisions[candId].decision === decision) {
    // Toggle off
    delete decisions[candId];
    document.querySelectorAll(`#card-${candId} .btn`).forEach(b => b.classList.remove('active'));
    const tag = document.getElementById(`dtag-${candId}`);
    if (tag) tag.innerHTML = '';
    if (trigger) { trigger.className = 'action-trigger'; trigger.textContent = 'Take Action'; }
    updateFooter();
    return;
  }
  decisions[candId] = { decision, name, notes: '' };
  // Preserve existing note if switching decision
  const ta = document.getElementById(`note-input-${candId}`);
  if (ta) decisions[candId].notes = ta.value;
  document.querySelectorAll(`#card-${candId} .btn`).forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`#card-${candId} .btn-${decision}`);
  if (activeBtn) activeBtn.classList.add('active');
  // Update trigger button
  const edColors = {interview:'decided-interview',reject:'decided-reject',hold:'decided-hold',
    send_ds:'decided-send',send_cap:'decided-send',send_mon:'decided-send',send_re:'decided-send'};
  const edLabels = {interview:'INTERVIEW',reject:'REJECT',hold:'HOLD',
    send_ds:'SEND DS',send_cap:'SEND CAP',send_mon:'SEND MON',send_re:'SEND RE'};
  if (trigger) { trigger.className = `action-trigger decided ${edColors[decision]||''}`; trigger.textContent = edLabels[decision] || decision.toUpperCase(); }
  // Update tag
  const tag = document.getElementById(`dtag-${candId}`);
  const tagCls = {interview:'dt-interview',reject:'dt-reject',hold:'dt-hold',
    send_ds:'dt-send',send_cap:'dt-send',send_mon:'dt-send',send_re:'dt-send'};
  const tagLabels = {interview:'INTERVIEW',reject:'REJECT',hold:'HOLD',
    send_ds:'SEND DS',send_cap:'SEND CAP',send_mon:'SEND MON',send_re:'SEND RE'};
  if (tag) tag.innerHTML = `<span class="decided-tag ${tagCls[decision]||''}">${tagLabels[decision]||decision.toUpperCase()}</span>`;
  updateFooter();
}

function updateDecisionNote(candId) {
  const ta = document.getElementById(`note-input-${candId}`);
  if (ta && decisions[candId]) decisions[candId].notes = ta.value;
}

function updateFooter() {
  const count = Object.keys(decisions).length;
  const label = document.getElementById('pending-label');
  label.textContent = count === 0 ? '0 decisions pending' : `${count} decision${count>1?'s':''} pending`;
  label.classList.toggle('has-decisions', count > 0);
  document.getElementById('submit-btn').disabled = count === 0;
  document.getElementById('submit-status').textContent = '';
}

async function submitDecisions() {
  const entries = Object.entries(decisions);
  if (!entries.length) return;
  const packetId = candidatesData[0]?.packet_id;
  try {
    for (const [candId] of entries) {
      await del('decisions', `candidate_id=eq.${candId}&executed=eq.false`);
    }
    const rows = entries.map(([candId, d]) => ({
      candidate_id: candId, packet_id: packetId,
      decision: d.decision, decided_by: 'rae@metr.org',
      notes: d.notes || null
    }));
    await insert('decisions', rows);
    document.getElementById('submit-status').textContent = 'Saved!';
  } catch(e) {
    document.getElementById('submit-status').textContent = 'Error: ' + e.message;
  }
}

function clearAll() {
  Object.keys(decisions).forEach(id => {
    document.querySelectorAll(`#card-${id} .btn`).forEach(b => b.classList.remove('active'));
    const noteBox = document.getElementById(`note-${id}`);
    if (noteBox) noteBox.classList.remove('visible');
    const tag = document.getElementById(`dtag-${id}`);
    if (tag) tag.innerHTML = '';
  });
  for (const k in decisions) delete decisions[k];
  updateFooter();
}

async function loadPacket() {
  const packets = await query('packets', 'order=created_at.desc&limit=1');
  if (!packets.length) { document.getElementById('main').innerHTML = '<div class="loading">No packet found.</div>'; return; }
  const packet = packets[0];
  document.getElementById('subtitle').textContent = `Week of ${packet.week_label} \u00b7 Prepared by Clout (Vaishnav)`;

  const candidates = await query('packet_candidates', `packet_id=eq.${packet.id}&order=tier.asc,name.asc`);
  candidatesData = candidates;

  const tests = await query('packet_tests', `candidate_id=in.(${candidates.map(c=>c.id).join(',')})&order=test_type.asc`);
  const testsByCand = {};
  tests.forEach(t => { (testsByCand[t.candidate_id] = testsByCand[t.candidate_id]||[]).push(t); });

  const existingDecisions = await query('decisions', `packet_id=eq.${packet.id}`);
  const decidedMap = {};
  existingDecisions.forEach(d => { decidedMap[d.candidate_id] = d; });

  const tiers = {0:0,1:0,2:0};
  candidates.forEach(c => tiers[c.tier]++);
  document.getElementById('counts').textContent = `${candidates.length} candidates \u00b7 ${tests.length} work tests`;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="num">${candidates.length}</div><div class="label">Candidates</div></div>
    <div class="stat"><div class="num">${tests.filter(t => JSON.parse(t.reviews||'[]').length > 0).length}</div><div class="label">Tests Graded</div></div>
    <div class="stat"><div class="num">${tiers[0]}</div><div class="label">Ready for Decision</div></div>
    <div class="stat"><div class="num">${tiers[1]}</div><div class="label">Waiting on Grades</div></div>`;

  let html = '';
  let lastTier = null;

  for (const c of candidates) {
    if (c.tier !== lastTier) {
      html += `<div class="tier-section"><div class="tier-label" style="color:${tierColors[c.tier]}">${tierLabels[c.tier]} (${tiers[c.tier]})</div></div>`;
      html += `<div class="col-headers"><div class="name-col">Candidate</div><div class="cs-col">CS</div><div class="tests-col">Tests</div><div class="clout-col">Clout Notes</div><div class="lever-col">Lever</div><div class="action-col">Action</div></div>`;
      lastTier = c.tier;
    }

    const cTests = testsByCand[c.id] || [];
    const links = JSON.parse(c.links||'[]');
    const leverUrl = c.lever_id ? `https://hire.lever.co/candidates/${c.lever_id}` : '#';
    const existingDec = decidedMap[c.id];
    const decTag = existingDec ? `<span class="decided-tag dt-${existingDec.decision}">${existingDec.decision.toUpperCase()}</span>` : '';

    // Summary row: test badges
    let testBadges = '';
    for (const t of cTests) {
      const reviews = JSON.parse(t.reviews||'[]');
      const best = reviews.find(r => r.rating) || {};
      const short = {'Data Science':'DS','Capability Projects':'Cap','Monitorability Projects':'Mon','Research Engineering':'RE'}[t.test_type] || t.test_type;
      const badge = best.rating ? ratingBadge(best.rating, false) : '<span class="b-ungraded">ungraded</span>';
      testBadges += `<div><span style="font-size:0.78rem;color:#495057;margin-right:3px">${short}:</span>${badge}</div>`;
    }

    // Clout notes — only show "Note to Rae" from Lever, nothing else
    let cloutSummary = '';
    if (c.clout_note) {
      cloutSummary = esc(c.clout_note.slice(0, 150)) + (c.clout_note.length > 150 ? '...' : '');
    } else {
      cloutSummary = '<span style="color:#adb5bd">\u2014</span>';
    }

    // Links (shown in detail section only, except Lever in summary)

    // Action column
    let actionHtml = '';
    const ed = existingDec?.decision || '';
    if (c.tier === 0) {
      if (ed) {
        const edColors = {interview:'decided-interview',reject:'decided-reject',hold:'decided-hold'};
        actionHtml = `<button class="action-trigger decided ${edColors[ed]}" onclick="toggleAction('${c.id}',event)">${ed.toUpperCase()}</button>`;
        decisions[c.id] = { decision: ed, name: c.name, notes: existingDec?.notes || '' };
      } else {
        actionHtml = `<button class="action-trigger" onclick="toggleAction('${c.id}',event)">Take Action</button>`;
      }
    } else if (c.tier === 1) {
      actionHtml = '<span class="waiting-label">Needs grading</span>';
    } else {
      actionHtml = '<span class="waiting-label">Needs submissions</span>';
    }

    // Detail content
    let detailHtml = '<div style="margin-top:12px;display:flex;gap:16px;align-items:center;font-size:0.85rem">';
    detailHtml += `<div><span style="font-size:0.75rem;color:#868e96;text-transform:uppercase">Email</span> ${esc(c.email||'')}</div>`;
    detailHtml += `<div><span style="font-size:0.75rem;color:#868e96;text-transform:uppercase">CodeSignal</span> ${csBadge(c.codesignal)}</div>`;
    detailHtml += `<div>${links.map(l => linkPill(l)).join('')}${c.lever_id ? `<a href="${leverUrl}" target="_blank" class="link-pill">Lever</a>` : ''}</div>`;
    detailHtml += '</div>';

    for (const t of cTests) {
      const reviews = JSON.parse(t.reviews||'[]');
      detailHtml += `<div class="test-hdr"><strong style="font-size:0.88rem">${esc(t.test_type)}</strong><span style="font-size:0.82rem;color:#868e96">${esc(t.submission_date||'')} \u00b7 ${esc(t.duration||'--')}</span></div>`;
      detailHtml += '<div class="test-body">';
      if (!reviews.length) {
        detailHtml += '<div class="rev-row" style="font-size:0.82rem;color:#868e96;font-style:italic">Not yet graded</div>';
      } else {
        for (const r of reviews) {
          const badge = ratingBadge(r.rating, true);
          const notesId = `notes-${Math.random().toString(36).slice(2,8)}`;
          const isLong = r.notes && r.notes.length > 200;
          detailHtml += `<div class="rev-row"><div class="rev-hdr"><span class="rev-name">${esc(r.reviewer)}</span>${badge}</div>`;
          if (r.notes) {
            detailHtml += `<div class="rev-notes ${isLong?'collapsed':''}" id="${notesId}">${esc(r.notes)}</div>`;
            if (isLong) detailHtml += `<span class="show-more" onclick="toggleNotes(this)">show more</span>`;
          }
          detailHtml += '</div>';
        }
      }
      detailHtml += '</div>';
    }

    if (c.lever_notes) {
      detailHtml += `<div class="lever-notes"><div class="ln-label">Lever Notes</div>${esc(c.lever_notes)}</div>`;
    }

    // Action panel (only tier 0)
    let actionPanelHtml = '';
    if (c.tier === 0) {
      const existingNote = existingDec?.notes || '';
      const panelVisible = existingDec ? 'visible' : '';
      const safeName = esc(c.name).replace(/'/g,"\\'");
      actionPanelHtml = `<div class="action-panel ${panelVisible}" id="action-panel-${c.id}">
        <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:10px">
          <div>
            <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;color:#868e96;margin-bottom:4px;font-weight:600">Decision</div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-interview ${ed==='interview'?'active':''}" onclick="decide('${c.id}','interview','${safeName}',event)">Interview</button>
              <button class="btn btn-reject ${ed==='reject'?'active':''}" onclick="decide('${c.id}','reject','${safeName}',event)">Reject</button>
              <button class="btn btn-hold ${ed==='hold'?'active':''}" onclick="decide('${c.id}','hold','${safeName}',event)">Hold</button>
            </div>
          </div>
          <div>
            <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;color:#868e96;margin-bottom:4px;font-weight:600">Send Assessment</div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-send" onclick="decide('${c.id}','send_ds','${safeName}',event)">DS Test</button>
              <button class="btn btn-send" onclick="decide('${c.id}','send_cap','${safeName}',event)">Cap Test</button>
              <button class="btn btn-send" onclick="decide('${c.id}','send_mon','${safeName}',event)">Mon Test</button>
              <button class="btn btn-send" onclick="decide('${c.id}','send_re','${safeName}',event)">RE Test</button>
            </div>
          </div>
        </div>
        <textarea id="note-input-${c.id}" style="width:100%;padding:8px;border:1px solid #dee2e6;border-radius:6px;font-size:0.82rem;font-family:inherit;resize:vertical;min-height:36px" placeholder="Note for Vaishnav (e.g., 'schedule interview with Nate', 'send DS + Mon tests', 'reject \u2014 too junior')" oninput="updateDecisionNote('${c.id}')">${esc(existingNote)}</textarea>
        <div style="font-size:0.72rem;color:#adb5bd;margin-top:4px;font-style:italic">Actions will be executed manually by Vaishnav after review.</div>
      </div>`;
    }

    const leverLink = c.lever_id ? `<a href="${leverUrl}" target="_blank" class="link-pill" onclick="event.stopPropagation()">Lever</a>` : '--';

    html += `<div class="card" id="card-${c.id}">
      <div class="card-summary" onclick="toggleCard('${c.id}')">
        <div class="name-col"><div class="name">${esc(c.name)}<span id="dtag-${c.id}">${decTag}</span></div><div class="role">${esc(c.role||'')}</div></div>
        <div class="cs-col">${csBadge(c.codesignal)}</div>
        <div class="tests-col">${testBadges}</div>
        <div class="clout-col">${cloutSummary}</div>
        <div class="lever-col">${leverLink}</div>
        <div class="action-col">${actionHtml}<span class="expand-icon" style="margin-left:6px">\u25B6</span></div>
      </div>
      ${actionPanelHtml}
      <div class="card-detail">${detailHtml}</div>
    </div>`;
  }

  document.getElementById('main').innerHTML = html;
  if (Object.keys(decisions).length) updateFooter();
}

loadPacket();
</script>
</body>
</html>
